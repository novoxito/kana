<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kana">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="stylesheet" href="styles.css">
<title>Kana</title>
</head>
<body>

<header id="topbar">
  <button id="back-btn" class="icon-btn" hidden>←</button>
  <h1 id="title">Kana</h1>
  <button id="settings-btn" class="icon-btn">⚙</button>
</header>

<main id="app">

  <section id="view-home" class="view active">

    <div class="section-block">
      <h2 class="section-title">Aprende Kana</h2>
      <div class="home-stats">
        <div class="stat"><span id="stat-active">0</span><small>activos</small></div>
        <div class="stat"><span id="stat-attempts">0</span><small>practicados</small></div>
        <div class="stat"><span id="stat-accuracy">0%</span><small>aciertos</small></div>
      </div>
      <div class="mode-grid">
        <button class="mode-card" data-mode="flashcard">
          <span class="mode-icon">🃏</span>
          <span class="mode-name">Flashcards</span>
          <span class="mode-desc">Repetición espaciada</span>
        </button>
        <button class="mode-card" data-mode="choice">
          <span class="mode-icon">🎯</span>
          <span class="mode-name">Opción múltiple</span>
          <span class="mode-desc">Elige el romaji</span>
        </button>
        <button class="mode-card" data-mode="typing">
          <span class="mode-icon">⌨️</span>
          <span class="mode-name">Escribir</span>
          <span class="mode-desc">Teclea el romaji</span>
        </button>
        <button class="mode-card" data-mode="drawing">
          <span class="mode-icon">✏️</span>
          <span class="mode-name">Trazado</span>
          <span class="mode-desc">Práctica visual</span>
        </button>
      </div>
    </div>

    <div class="section-block">
      <h2 class="section-title">Pokédex</h2>
      <div class="home-stats">
        <div class="stat"><span id="stat-pk-active">0</span><small>activos</small></div>
        <div class="stat"><span id="stat-pk-readable">0</span><small>legibles</small></div>
        <div class="stat"><span id="stat-pk-total">151</span><small>total</small></div>
      </div>
      <div class="mode-grid">
        <button class="mode-card wide" data-mode="pokedex">
          <span class="mode-icon">📖</span>
          <span class="mode-name">Pokédex</span>
          <span class="mode-desc">Lee nombres en katakana</span>
        </button>
      </div>
    </div>

  </section>

  <section id="view-settings" class="view">
    <div class="settings-tabs">
      <button class="tab active" data-section="kana">Kana</button>
      <button class="tab" data-section="pokemon">Pokédex</button>
    </div>

    <div id="settings-kana" class="settings-pane active">
      <div class="settings-tabs sub">
        <button class="tab active" data-script="hiragana">ひらがな</button>
        <button class="tab" data-script="katakana">カタカナ</button>
      </div>
      <div class="settings-tabs sub tier-tabs">
        <button class="tab active" data-tier="basic">Básico</button>
        <button class="tab" data-tier="dakuten">Dakuten</button>
        <button class="tab" data-tier="yoon">Yōon</button>
      </div>
      <div class="settings-actions">
        <button id="select-all" class="ghost-btn">Todos (tier)</button>
        <button id="select-none" class="ghost-btn">Ninguno (tier)</button>
        <button id="reset-progress" class="ghost-btn danger">Reset progreso</button>
      </div>
      <div id="kana-grid"></div>
    </div>

    <div id="settings-pokemon" class="settings-pane">
      <div class="settings-actions">
        <button id="pk-fetch" class="ghost-btn">Cargar datos</button>
        <button id="pk-active-readable" class="ghost-btn">Activar legibles</button>
        <button id="pk-active-all" class="ghost-btn">Activar todos</button>
        <button id="pk-active-none" class="ghost-btn">Ninguno</button>
        <button id="pk-reset" class="ghost-btn danger">Reset progreso</button>
      </div>
      <div id="pk-progress" class="pk-progress" hidden>
        <div class="progress"><div id="pk-progress-bar"></div></div>
        <small id="pk-progress-label"></small>
      </div>
      <div id="pk-grid"></div>
    </div>
  </section>

  <section id="view-mode" class="view">
    <div id="mode-container"></div>
  </section>

</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
